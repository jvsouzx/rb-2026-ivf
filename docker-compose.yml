services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
    networks:
      - lb-net
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 50MB

  app1:
    image: ghcr.io/jvsouzx/rb-2026-ivf:0.0.4
    environment:
      RB_IVF_NPROBE: "128"
      RB_IVF_CANDIDATE_CAP: "65536"
      RB_IVF_FALLBACK_NPROBE: "128"
      RB_IVF_FALLBACK_CANDIDATE_CAP: "65536"
    networks:
      - lb-net
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: 150MB

  app2:
    image: ghcr.io/jvsouzx/rb-2026-ivf:0.0.4
    environment:
      RB_IVF_NPROBE: "128"
      RB_IVF_CANDIDATE_CAP: "65536"
      RB_IVF_FALLBACK_NPROBE: "128"
      RB_IVF_FALLBACK_CANDIDATE_CAP: "65536"
    networks:
      - lb-net
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: 150MB

networks:
  lb-net:
    driver: bridge
