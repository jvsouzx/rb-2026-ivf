worker_processes 1;
worker_rlimit_nofile 8192;
error_log /dev/null crit;

events {
    worker_connections 4096;
    multi_accept on;
}

stream {
    access_log off;

    upstream myapp {
        server app1:8080;
        server app2:8080;
    }

    server {
        listen 80;
        proxy_pass myapp;
        proxy_connect_timeout 1s;
        tcp_nodelay on;
    }
}
