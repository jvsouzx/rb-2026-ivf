worker_processes 1;
worker_rlimit_nofile 8192;
error_log /dev/null crit;

events {
    worker_connections 4096;
    multi_accept on;
}

# Load balancing em camada 4 (TCP). O nginx apenas faz splice dos bytes entre
# cliente e app, sem parsear HTTP nem reescrever headers — ~5-10x menos CPU por
# requisição que o proxy HTTP (camada 7). O app responde HTTP direto ao cliente.
stream {
    access_log off;

    upstream myapp {
        server app:8080;
    }

    server {
        listen 80;
        proxy_pass myapp;
        proxy_connect_timeout 1s;
        tcp_nodelay on;
    }
}
