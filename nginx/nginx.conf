worker_processes 1;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    access_log off;
    error_log /dev/null crit;

    tcp_nodelay on;
    tcp_nopush on;
    sendfile on;

    upstream myapp {
        server app:8080;
        keepalive 64;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://myapp;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
