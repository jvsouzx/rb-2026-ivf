services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - lb-net
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 50MB
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rb-2026-app
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.45"
          memory: 150MB
    networks:
      - lb-net

networks:
  lb-net:
    driver: bridge
