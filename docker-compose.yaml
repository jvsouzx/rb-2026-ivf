services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - lb-net
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 50MB
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RB_IVF_NLIST: "8192"
        RB_IVF_SAMPLE_SIZE: "200000"
        RB_IVF_ITERATIONS: "12"
    image: rb-2026-app
    environment:
      RB_IVF_NPROBE: "4"
      RB_IVF_CANDIDATE_CAP: "1024"
      RB_IVF_FALLBACK_NPROBE: "4"
      RB_IVF_FALLBACK_CANDIDATE_CAP: "1024"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.40"
          memory: 150MB
    networks:
      - lb-net

networks:
  lb-net:
    driver: bridge
